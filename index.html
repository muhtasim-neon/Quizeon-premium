    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Zen Kaku Gothic New"', 'sans-serif'],
              jp: ['"Zen Kaku Gothic New"', 'sans-serif'],
              serif: ['"Zen Kaku Gothic New"', 'sans-serif'],
              mono: ['"Zen Kaku Gothic New"', 'monospace'], 
            },
            colors: {
              rice: '#fdfaf1',
              ink: '#3e2723',
              bamboo: '#795548',
              hanko: '#bc2f32',
              straw: '#d4a373',
              wood: '#8d6e63',
              white: '#ffffff', 
              black: '#3e2723',
              gray: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#e6e0d4', 300: '#d4a373', 400: '#795548', 500: '#795548', 600: '#795548', 700: '#3e2723', 800: '#3e2723', 900: '#3e2723' },
              slate: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#d4a373', 500: '#795548', 800: '#3e2723', 900: '#3e2723' },
              zinc: { 50: '#fdfaf1', 500: '#795548', 900: '#3e2723' },
              neutral: { 50: '#fdfaf1', 500: '#795548', 900: '#3e2723' },
              stone: { 50: '#fdfaf1', 500: '#795548', 900: '#3e2723' },
              red: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#d4a373', 500: '#bc2f32', 600: '#bc2f32', 700: '#3e2723', 800: '#3e2723', 900: '#3e2723' },
              rose: { 50: '#fdfaf1', 100: '#fdfaf1', 500: '#bc2f32', 600: '#bc2f32' },
              pink: { 50: '#fdfaf1', 100: '#fdfaf1', 500: '#bc2f32', 600: '#bc2f32' },
              orange: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#d4a373', 500: '#bc2f32', 600: '#bc2f32' },
              yellow: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#d4a373', 400: '#d4a373', 500: '#d4a373', 600: '#d4a373', 900: '#3e2723' },
              amber: { 50: '#fdfaf1', 100: '#fdfaf1', 500: '#d4a373', 600: '#d4a373' },
              green: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#d4a373', 500: '#8d6e63', 600: '#8d6e63', 700: '#3e2723' },

              teal: { 50: '#fdfaf1', 100: '#fdfaf1', 500: '#8d6e63', 600: '#8d6e63' },
              blue: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#d4a373', 500: '#8d6e63', 600: '#795548', 700: '#3e2723', 800: '#3e2723' },
              indigo: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#d4a373', 500: '#8d6e63', 600: '#3e2723' },
              violet: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#d4a373', 500: '#8d6e63', 600: '#3e2723' },
              purple: { 50: '#fdfaf1', 100: '#fdfaf1', 200: '#d4a373', 500: '#8d6e63', 600: '#3e2723', 700: '#3e2723' },
              cyan: { 50: '#fdfaf1', 500: '#8d6e63' },
              sky: { 50: '#fdfaf1', 500: '#8d6e63' },

            animation: {
              'fade-in': 'fadeIn 0.6s ease-out forwards',
              'float': 'float 6s ease-in-out infinite',
              'pop': 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'bounce-slight': 'bounceSlight 2s infinite',
              'ink-bleed': 'inkBleed 1.5s ease-out forwards',
              'shake': 'shake 0.4s ease-in-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              pop: {
                '0%': { transform: 'scale(0.8)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' }
              },
              bounceSlight: {
                '0%, 100%': { transform: 'translateY(-3px)' },
                '50%': { transform: 'translateY(3px)' }
              },
              inkBleed: {
                '0%': { transform: 'scale(0.8)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' }
              },
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '25%': { transform: 'translateX(-5px)' },
                '75%': { transform: 'translateX(5px)' }
              }
            }
          }
        }
      }

    <style>
      :root {
        --primary: #8d6e63;
        --secondary: #3e2723;
        --accent: #d4a373;
        --hanko: #bc2f32;
        --washi-bg: #fdfaf1;
        --washi-dim: #795548;
        
        --color-bg: var(--washi-bg);
        --color-ink: var(--secondary);
      }

      body {
        background-color: var(--color-bg);
        color: var(--color-ink);
        font-family: 'Zen Kaku Gothic New', sans-serif;
        overflow-x: hidden;
      }

      /* Cyber-Washi Grid Pattern */
      .bg-pattern {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(212, 163, 115, 0.1) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(212, 163, 115, 0.1) 1px, transparent 1px);
        opacity: 0.8;
      }

      /* Washi Paper Texture Overlay */
      .washi-texture {
        background-color: transparent;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
        background-repeat: repeat;
        opacity: 0.3;
        mix-blend-mode: multiply;
        pointer-events: none;
      }

      /* Grain effect */
      .washi-grain {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.2'/%3E%3C/svg%3E");
        background-repeat: repeat;
      }

      /* Tech/Modern Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(141, 110, 99, 0.05);
      }
      ::-webkit-scrollbar-thumb {
        background: #d4a373;
        border-radius: 0px; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #8d6e63;
      }

      .writing-vertical {
        writing-mode: vertical-rl;
        text-orientation: upright;
      }

      .text-shadow-sm {
        text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
      }
      
      .backface-hidden {
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
    </style>
