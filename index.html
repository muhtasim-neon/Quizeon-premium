<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizeon 3.0 - N5 Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Noto Sans JP', 'sans-serif'],
              jp: ['Noto Sans JP', 'sans-serif'],
              serif: ['Noto Sans JP', 'sans-serif'],
            },
            colors: {
              // Enhanced Earth & Ink Palette
              rice: '#fbf9f1',      // Warmer, cleaner paper
              ink: '#2c2421',       // Deep charcoal/coffee
              sumi: '#1a1a1a',      // Black ink
              bamboo: '#8d7b68',    // Soft wood/brown
              hanko: '#c93a40',     // Vibrant stamp red
              straw: '#e0c097',     // Gold/Sand accent
              paper: '#ffffff',     // Pure white
              
              // Functional
              primary: '#c93a40',   
              secondary: '#8d7b68', 
              accent: '#e0c097',    
            },
            animation: {
              'ink-bleed': 'inkBleed 1s cubic-bezier(0.2, 1, 0.3, 1) forwards',
              'sakura-fall': 'sakuraFall 15s linear infinite',
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'float': 'float 6s ease-in-out infinite',
              'float-slow': 'float 10s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'blob': 'blob 10s infinite',
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
              'pop': 'pop 0.4s ease-out forwards',
            },
            keyframes: {
              inkBleed: {
                '0%': { opacity: '0', transform: 'scale(0.98) translateY(20px)', filter: 'blur(4px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)', filter: 'blur(0px)' },
              },
              sakuraFall: {
                '0%': { transform: 'translateY(-10%) rotate(0deg) translateX(0)', opacity: '0' },
                '10%': { opacity: '0.8' },
                '90%': { opacity: '0.8' },
                '100%': { transform: 'translateY(110%) rotate(360deg) translateX(50px)', opacity: '0' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
              },
              pop: {
                '0%': { transform: 'scale(0)', opacity: '0' },
                '50%': { transform: 'scale(1.2)', opacity: '1' },
                '100%': { transform: 'scale(1)', opacity: '0' }
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-bg: #fbf9f1;
        --color-ink: #2c2421;
        --color-bamboo: #8d7b68;
        --color-hanko: #c93a40;
        --color-straw: #e0c097;
      }

      body {
        background-color: var(--color-bg);
        color: var(--color-ink);
        font-family: 'Noto Sans JP', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* --- 1. Organic Texture (Washi Noise) --- */
      .washi-texture {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        /* Subtle noise texture */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.6;
      }

      /* --- 3. Enhanced Shoji Card --- */
      .shoji-card {
        background: rgba(255, 255, 255, 0.7); 
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 
          0 4px 6px -1px rgba(0, 0, 0, 0.02),
          0 2px 4px -1px rgba(0, 0, 0, 0.02),
          inset 0 0 20px rgba(255, 255, 255, 0.5); /* Inner glow */
      }

      /* --- 5. Animation Classes --- */
      .sakura {
        position: fixed;
        background: linear-gradient(to bottom right, #ffd7e6, #ffb7b2);
        border-radius: 100% 0% 100% 0%;
        pointer-events: none;
        z-index: 0;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      }

      /* Typography adjustments */
      h1, h2, h3, h4, h5, h6, .font-serif {
        color: var(--color-ink);
        letter-spacing: -0.01em;
      }
      
      /* Smooth transitions */
      a, button {
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(141, 123, 104, 0.05);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(141, 123, 104, 0.2);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(201, 58, 64, 0.4);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^3.4.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.93.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <div class="washi-texture"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
